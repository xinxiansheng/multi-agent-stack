# ============================================================
# Web Scraper Source Configs (requires beautifulsoup4)
# ============================================================
# For sites without RSS feeds. Used by collect.py.
#
# Format:
#   sites:
#     source_id:
#       name: <display name>
#       url: <page URL>
#       list_selector: <CSS selector for item list>
#       title_from: <"text" | "attr:title" | "a[title]">
#       link_selector: <CSS selector> (default: "a")
#       link_attr: <attribute> (default: "href")
#       date_selector: <CSS selector for date> (optional)
#       date_strip: <chars to remove from date> (optional)
#       base_url: <base URL for relative links> (default: url)
#       max_items: <int> (default: 15)
#       timeout: <seconds> (default: 15)
#       verify_ssl: <bool> (default: true)
#       skip_styled: <bool> (default: false)
#       title_strip_suffix: <suffix to remove from title> (optional)
# ============================================================

sites:
